[workspace]
resolver = "2"
members = [
    "ebpf_streamer",
    "ebpf_streamer-common",
    "ebpf_streamer-ebpf",
]
default-members = ["ebpf_streamer", "ebpf_streamer-common"]

[workspace.package]
license = "MIT OR Apache-2.0"

[workspace.dependencies]
#aya = { version = "0.13.1", default-features = false }
aya-build = { version = "0.1.2", default-features = false }
#aya-ebpf = { version = "0.1.1", default-features = false }
#aya-log = { version = "0.2.1", default-features = false }
#aya-log-ebpf = { version = "0.1.1", default-features = false }
aya = { path = "../aya/aya", default-features = false }
aya-ebpf = { path = "../aya/ebpf/aya-ebpf", default-features = false }
aya-log = { path = "../aya/aya-log", default-features = false }
aya-log-ebpf = { path = "../aya/ebpf/aya-log-ebpf", default-features = false }

anyhow = { version = "1", default-features = false }
env_logger = { version = "0.11.5", default-features = false }
libc = { version = "0.2.159", default-features = false }
log = { version = "0.4.22", default-features = false }
which = { version = "6.0.0", default-features = false }

[profile.release.package.ebpf_streamer-ebpf]
debug = 2
codegen-units = 1
